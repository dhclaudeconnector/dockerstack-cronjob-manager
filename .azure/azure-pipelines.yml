# Path: .azure/azure-pipelines.yml
# Deploys the modular Docker Compose stack via dc.sh.
# Supports both ubuntu-latest and windows-latest agents.

name: dockerstackcronjob

trigger: none
# schedules:
#   - cron: "*/55 * * * *"
#     displayName: "Run every 55 minutes"
#     always: true
#     branches:
#       include:
#         - "*"
variables:
  STOP_RUNNER_ID: "$(Build.BuildId)-$(System.JobAttempt)"
  STOP_LISTENER_ENABLED: "true"
  # Bật BuildKit + Compose CLI build để ci-build.sh dùng được buildx cache.
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
pool:
  # ✅ Đổi ở đây để chọn runner: ubuntu-latest | windows-latest
  vmImage: "ubuntu-latest"

jobs:
  - job: main
    # https://dev.azure.com/jjpaulinzonemailclpccdedu/o22zalo
    # https://dev.azure.com/asregister/o22zalo/_git/dockerstack-omniroute
    # https://dev.azure.com/jjpaulinzonemailclpccdedu/o22zalo/_git/dockerstackcronjob
    condition: >-
      or(
        and(
          contains(variables['System.CollectionUri'], 'asregister'),
          eq(variables['System.TeamProject'], 'o22zalo'),
          eq(variables['Build.Repository.Name'], 'dockerstack-omniroute')
        ),
        and(
          contains(variables['System.CollectionUri'], 'asregister'),
          eq(variables['System.TeamProject'], 'o22zalo'),
          eq(variables['Build.Repository.Name'], 'dockerstack-omniroute')
        ),
        and(
          contains(variables['System.CollectionUri'], 'jjpaulinzonemailclpccdedu'),
          eq(variables['System.TeamProject'], 'o22zalo'),
          eq(variables['Build.Repository.Name'], 'dockerstackcronjob')
        )
      )
    steps:
      - checkout: self
        displayName: "Checkout"
      # ── Step 1: Pull .env + credentials from RTDB ─────────────
      - bash: bash .github/scripts/pull-env.sh
        env:
          DOTENVRTDB_URL: $(DOTENVRTDB_URL)
      # ── Step 2: Detect OS → append vars to .env ───────────────
      - bash: dotenvrtdb -e .env -- bash .github/scripts/detect-os.sh
        displayName: "Detect OS environment"
      # ── Step 3: OS-specific setup ─────────────────────────────
      - bash: dotenvrtdb -e .env -- bash .github/scripts/setup-linux.sh
        displayName: "Setup environment (Linux)"
      # ── Step 4: Validate config ────────────────────────────────
      - bash: dotenvrtdb -e .env -- node docker-compose/scripts/validate-env.js
        displayName: "Validate env"

      # ── BuildKit local cache (luôn lưu bản mới nhờ BuildId) ───
      # restoreKeys cho phép tái dùng cache từ build trước (prefix match).
      - task: Cache@2
        displayName: "Cache BuildKit layers"
        inputs:
          key: 'buildx | "$(Agent.OS)" | "$(Build.Repository.Name)" | "$(Build.BuildId)"'
          restoreKeys: |
            buildx | "$(Agent.OS)" | "$(Build.Repository.Name)"
            buildx | "$(Agent.OS)"
          path: "$(Pipeline.Workspace)/.buildx-cache"

      # ── Public image cache (xoay vòng theo TUẦN) ──────────────
      - bash: echo "##vso[task.setvariable variable=IMG_WEEK]$(date -u +%G-%V)"
        displayName: "Compute weekly image cache key"
      - task: Cache@2
        displayName: "Cache public docker images"
        inputs:
          key: "pubimg | v1 | $(IMG_WEEK)"
          path: "$(Pipeline.Workspace)/ci-public-images"
      - bash: mkdir -p "$(Pipeline.Workspace)/ci-public-images"
        displayName: "Ensure public image cache dir exists"

      # ── Set up Docker Buildx (docker-container driver) ────────
      # Driver docker-container bắt buộc để dùng type=local cache export.
      - bash: |
          set -euo pipefail
          docker buildx create --name ci-builder --driver docker-container --use 2>/dev/null \
            || docker buildx use ci-builder
          docker buildx inspect --bootstrap
        displayName: "Set up Docker Buildx"

      # ── Step 5: Build 1 lần (cache) + deploy ──────────────────
      - bash: dotenvrtdb -e .env -- bash docker-compose/scripts/ci-build.sh
        displayName: "Build images (cache) & deploy stack"
        env:
          CACHE_TYPE: local
          LOCAL_CACHE_DIR: "$(Pipeline.Workspace)/.buildx-cache"
          IMAGE_TAR: "$(Pipeline.Workspace)/ci-public-images/images.tar"

      # ── Step 6: Cleanup + keepalive ───────────────────────────
      # Chỉ prune image cũ hơn 72h → giữ layer gần đây cho cache hit.
      - bash: docker image prune -f --filter "until=72h"
        displayName: "Clean up unused images (Linux)"
      - bash: |
          dotenvrtdb -e .env -- dotenvrtdb runner set-stoprunnerid
          dotenvrtdb -e .env -- dotenvrtdb runner keepalive
        displayName: "dotenvrtdb runner keepalive + set-stoprunnerid"
      # ── Step 7: Collect artifacts (always) ────────────────────
      - bash: dotenvrtdb -e .env -- bash .github/scripts/collect-artifacts.sh
        displayName: "Collect docker runtime artifacts (Linux)"
        condition: always()
      - task: PublishPipelineArtifact@1
        displayName: "Upload docker runtime artifacts"
        condition: always()
        inputs:
          targetPath: "artifacts/docker-runtime"
          artifact: "docker-runtime"
          publishLocation: pipeline
